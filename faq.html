<!doctype html>
<html lang="fr" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>FAQ – To Be Father</title>
  <meta name="description" content="Questions fréquentes à propos de To Be Father : application, prix, cibles, valeurs, médias, partenariats, sécurité et développement.">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --night:#0E2740; --text:#E6EAF0; --grad-from:#2F80ED; --grad-to:#6C63FF; --glass:rgba(255,255,255,.08); --border:rgba(255,255,255,.18); --radius:20px; }
    *{box-sizing:border-box}
    html,body{margin:0;background:linear-gradient(160deg,#0E2740,#0B1B2B); color:var(--text); font-family:Inter,system-ui,sans-serif; line-height:1.7}
    a{color:inherit; text-decoration:none}
    .container{max-width:900px; margin:0 auto; padding:20px}
    .card{background:var(--glass); border:1px solid var(--border); border-radius:var(--radius); backdrop-filter:saturate(150%) blur(14px); box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .btn{display:inline-flex; align-items:center; gap:.6rem; padding:.85rem 1.1rem; border-radius:14px; font-weight:600}
    .btn.primary{background:linear-gradient(90deg,var(--grad-from),var(--grad-to)); color:#fff}
    .btn.ghost{border:1px solid var(--border); background:rgba(255,255,255,.06)}
    header{position:sticky; top:0; padding:10px 0; backdrop-filter:blur(10px)}
    h1{font-family:Poppins,Inter,sans-serif; margin:.5rem 0 1rem; text-align:center}
    h3{margin:1.2rem 0 .6rem}
    details{border-radius:14px; border:1px solid var(--border); background:rgba(255,255,255,.05); padding:12px 14px}
    details + details{margin-top:10px}
    summary{cursor:pointer; font-weight:700; outline:none}
    summary::-webkit-details-marker{display:none}
    summary:focus-visible{outline:3px solid rgba(99,102,241,.8); border-radius:10px}
    .group{margin:16px 0}
    .lead{opacity:.9; text-align:center}
    .logo-img{width:30px; height:30px; border-radius:8px; object-fit:cover}
  </style>

  <!-- JSON-LD (enrichi, inchangé côté questions) -->
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"FAQPage",
    "mainEntity":[
      {"@type":"Question","name":"Quand sortira l’application ?","acceptedAnswer":{"@type":"Answer","text":"Juillet 2026. La bêta privée sera annoncée en amont sur nos réseaux pour recueillir les retours et améliorer l’expérience avant le lancement public."}},
      {"@type":"Question","name":"iOS & Android ?","acceptedAnswer":{"@type":"Answer","text":"Oui (App Store & Google Play). L’application sera disponible sur iPhone et Android, avec une expérience cohérente et des performances optimisées sur les deux plateformes."}},
      {"@type":"Question","name":"Utilisable dès la grossesse ?","acceptedAnswer":{"@type":"Answer","text":"Absolument. Dès l’annonce, l’app propose des conseils adaptés à chaque trimestre, ainsi que des rappels pratiques et des checklists évolutives."}},
      {"@type":"Question","name":"Espace pour échanger ?","acceptedAnswer":{"@type":"Answer","text":"Souhaité à terme. Nous priorisons une modération bienveillante et des espaces thématiques (sommeil, charge mentale, retour au travail, etc.)."}},

      {"@type":"Question","name":"Version gratuite ?","acceptedAnswer":{"@type":"Answer","text":"Oui, essentiels + IA (5 questions/jour). La version gratuite couvre les bases, avec du contenu de qualité et des outils utiles au quotidien."}},
      {"@type":"Question","name":"Prix premium ?","acceptedAnswer":{"@type":"Answer","text":"4,39 € / mois. Le tarif est pensé pour rester accessible tout en finançant la qualité éditoriale et les validations d’experts."}},
      {"@type":"Question","name":"Que comprend l’abonnement ?","acceptedAnswer":{"@type":"Answer","text":"IA illimitée, suivi avancé, contenus & outils exclusifs. Vous débloquez aussi des vues plus détaillées, des rappels intelligents et des futures fonctionnalités communautaires."}},
      {"@type":"Question","name":"Offre annuelle ?","acceptedAnswer":{"@type":"Answer","text":"35,99 € / an (−20%). Cette formule réduit le coût mensuel et inclut les mêmes avantages Premium."}},

      {"@type":"Question","name":"À qui ?","acceptedAnswer":{"@type":"Answer","text":"À tous les pères; multiculturel & personnalisé. L’app s’adapte à votre contexte familial, culturel et professionnel."}},
      {"@type":"Question","name":"Utile pour les mamans ?","acceptedAnswer":{"@type":"Answer","text":"Oui, rééquilibre la charge mentale. Les outils de partage et les checklists permettent une organisation plus fluide au sein du couple."}},
      {"@type":"Question","name":"Déjà papa ?","acceptedAnswer":{"@type":"Answer","text":"Oui. To Be Father se calibre pour les seconds enfants, les familles recomposées et différents rythmes de vie."}},
      {"@type":"Question","name":"Différences vs autres apps ?","acceptedAnswer":{"@type":"Answer","text":"1er assistant personnel de paternité, IA spécialisée qui s’adapte en temps réel. Notre approche met le père au centre, sans clichés, avec un accompagnement expertisé."}},

      {"@type":"Question","name":"Pourquoi ?","acceptedAnswer":{"@type":"Answer","text":"Peu d’outils pour 175M de nouveaux pères/an. Nous voulons combler ce vide avec une ressource fiable, inclusive et actionnable."}},
      {"@type":"Question","name":"Objectif principal ?","acceptedAnswer":{"@type":"Answer","text":"Soutien concret & place pleine du père. L’idée est d’outiller et de valoriser les pères dans leur rôle, au quotidien."}},
      {"@type":"Question","name":"Égalité parentale ?","acceptedAnswer":{"@type":"Answer","text":"Équilibrée & partagée. L’app favorise des pratiques plus justes et des conversations ouvertes au sein du couple."}},
      {"@type":"Question","name":"Long terme ?","acceptedAnswer":{"@type":"Answer","text":"Convaincre France/Europe/Monde. Nous déploierons le contenu et les partenariats localement avec des experts."}},

      {"@type":"Question","name":"Seulement une app ?","acceptedAnswer":{"@type":"Answer","text":"Non, aussi un média engagé. Nous publions des témoignages, des interviews et des formats courts utiles."}},
      {"@type":"Question","name":"Où suivre ?","acceptedAnswer":{"@type":"Answer","text":"@tobefather.off (IG/LinkedIn/Facebook/TikTok). Les annonces produits et appels à bêta y seront partagés en priorité."}},
      {"@type":"Question","name":"Témoignages ?","acceptedAnswer":{"@type":"Answer","text":"Oui, au centre du projet. Vos retours orientent notre roadmap et nos contenus."}},
      {"@type":"Question","name":"Podcast/YouTube ?","acceptedAnswer":{"@type":"Answer","text":"Prévu (YouTube/Spotify/Deezer). Une émission est en préparation pour approfondir les sujets avec des experts."}},

      {"@type":"Question","name":"Quels pros ?","acceptedAnswer":{"@type":"Answer","text":"Médecins & spécialistes en activité (voir story PRO TBF). Nous collaborons avec des obstétriciens, sages-femmes, psychologues, sexologues et juristes."}},
      {"@type":"Question","name":"Liés à des mutuelles/institutions ?","acceptedAnswer":{"@type":"Answer","text":"Pas encore, en travail. Nous préparons des offres adaptées aux entreprises et organismes."}},
      {"@type":"Question","name":"Entreprises ?","acceptedAnswer":{"@type":"Answer","text":"Oui, avantage RH possible. Accompagnement des salariés pères, prévention et qualité de vie au travail."}},
      {"@type":"Question","name":"Pro de santé ?","acceptedAnswer":{"@type":"Answer","text":"Oui: contact@tobefather.com. Nous serions heureux d’échanger sur des collaborations."}},

      {"@type":"Question","name":"Données protégées ?","acceptedAnswer":{"@type":"Answer","text":"Oui, priorité absolue; jamais revendues sans accord. Chiffrement en transit et bonnes pratiques de sécurité."}},
      {"@type":"Question","name":"RGPD ?","acceptedAnswer":{"@type":"Answer","text":"Oui, respect strict. Vous pouvez demander l’export ou la suppression de vos données."}},
      {"@type":"Question","name":"Partage d’infos perso ?","acceptedAnswer":{"@type":"Answer","text":"Non, sauf choix explicite (ex. autre parent). Vous contrôlez les autorisations de partage à tout moment."}},
      {"@type":"Question","name":"Anonymat ?","acceptedAnswer":{"@type":"Answer","text":"Non (app personnalisée), mais données sécurisées. Nous minimisons les données collectées et évitons tout traçage superflu."}},

      {"@type":"Question","name":"International ?","acceptedAnswer":{"@type":"Answer","text":"Oui, progressivement avec experts locaux. Nous adapterons le contenu aux spécificités culturelles et légales."}},
      {"@type":"Question","name":"Traductions ?","acceptedAnswer":{"@type":"Answer","text":"Anglais, espagnol, allemand (priorité). D’autres langues seront ajoutées ensuite."}},
      {"@type":"Question","name":"Version web ?","acceptedAnswer":{"@type":"Answer","text":"Pas au début; installation requise. L’objectif est une expérience mobile soignée avant d’envisager une version web."}},
      {"@type":"Question","name":"Couples séparés ?","acceptedAnswer":{"@type":"Answer","text":"Oui, prévu. L’app proposera des options pour mieux s’organiser à distance et partager l’essentiel."}}
    ]
  }
  </script>
